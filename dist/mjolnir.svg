<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Hammer head -->
  <rect x="8" y="8" width="48" height="20" rx="3" fill="#94a3b8" stroke="#475569" stroke-width="2"/>
  <!-- Head detail lines -->
  <line x1="18" y1="12" x2="18" y2="24" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="46" y1="12" x2="46" y2="24" stroke="#475569" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Head center knot -->
  <rect x="26" y="11" width="12" height="14" rx="2" fill="#475569"/>
  <rect x="28" y="13" width="8" height="10" rx="1" fill="#64748b"/>
  <!-- Handle -->
  <rect x="29" y="28" width="6" height="24" rx="1" fill="#92400e" stroke="#78350f" stroke-width="1.5"/>
  <!-- Handle wrap -->
  <rect x="28" y="34" width="8" height="3" rx="1" fill="#78350f"/>
  <rect x="28" y="40" width="8" height="3" rx="1" fill="#78350f"/>
  <rect x="28" y="46" width="8" height="3" rx="1" fill="#78350f"/>
  <!-- Pommel -->
  <rect x="27" y="52" width="10" height="5" rx="2" fill="#92400e" stroke="#78350f" stroke-width="1.5"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="180" height="160" viewBox="0 0 180 160">
  <!-- Tileable Mjolnir wallpaper pattern — scaled up hammer, larger tile for spacing -->
  <g opacity="1" fill="#94a3b8" stroke="#94a3b8" transform="rotate(45, 90, 80)">
    <!-- Hammer head -->
    <rect x="30" y="48" width="60" height="25" rx="4" fill="#94a3b8" stroke="none"/>
    <!-- Head detail lines -->
    <line x1="42" y1="53" x2="42" y2="68" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
    <line x1="78" y1="53" x2="78" y2="68" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round"/>
    <!-- Head center knot -->
    <rect x="51" y="52" width="18" height="17" rx="2" fill="#cbd5e1" stroke="none"/>
    <!-- Handle -->
    <rect x="55" y="73" width="10" height="34" rx="2" fill="#94a3b8" stroke="none"/>
    <!-- Handle wraps -->
    <rect x="53" y="81" width="14" height="4" rx="1" fill="#cbd5e1" stroke="none"/>
    <rect x="53" y="89" width="14" height="4" rx="1" fill="#cbd5e1" stroke="none"/>
    <rect x="53" y="97" width="14" height="4" rx="1" fill="#cbd5e1" stroke="none"/>
    <!-- Pommel -->
    <rect x="52" y="107" width="16" height="7" rx="3" fill="#94a3b8" stroke="none"/>
  </g>
</svg>
